<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JaketStoreCaesar</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#666;
}

/* SPLASH FIX */
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    pointer-events:none;
}

#splash img{
    width:120px;
}

/* CONTENT */
.container{
    padding:20px;
}

h1{
    text-align:center;
    color:white;
}

.produk{
    background:white;
    margin-bottom:15px;
    padding:15px;
    border-radius:10px;
}

.produk img{
    width:100%;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="img/splashscreen.png">
</div>

<h1>🔥 Koleksi Jaket</h1>

<div class="container">

<div class="produk">
<img src="img/jaket1.jpg">
<h3>Jaket Hoodie Hitam</h3>
<p>Rp150.000</p>
<button onclick="beli('Jaket Hoodie Hitam')">Beli</button>
</div>

<div class="produk">
<img src="img/jaket2.jpg">
<h3>Jaket Denim</h3>
<p>Rp220.000</p>
<button onclick="beli('Jaket Denim')">Beli</button>
</div>

<div class="produk">
<img src="img/jaket3.jpg">
<h3>Bomber Jacket</h3>
<p>Rp250.000</p>
<button onclick="beli('Bomber Jacket')">Beli</button>
</div>

<div class="produk">
<img src="img/jaket4.jpg">
<h3>Varsity Jacket</h3>
<p>Rp280.000</p>
<button onclick="beli('Varsity Jacket')">Beli</button>
</div>

</div>

<script>
// splash aman + remove biar gak ganggu touch
setTimeout(()=>{
    let splash = document.getElementById("splash");
    if (splash) splash.remove();
},3000);

// pindah checkout
function beli(nama){
    localStorage.setItem("produkDipilih", nama);
    location.href = "checkout.html";
}
</script>

</body>
</html>
